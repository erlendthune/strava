name: Sync Strava Data
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  repository_dispatch:
    types: [strava_webhook] # Allows you to trigger it via webhook
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Fresh Access Token
        id: strava_auth
        run: |
          TOKEN_RESPONSE=$(curl -X POST https://www.strava.com/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          
          # Extract the access token using jq
          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          echo "STRAVA_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Fetch Club Activities
        run: |
          curl -X GET "https://www.strava.com/api/v3/clubs/1475451/activities?per_page=50" \
            -H "Authorization: Bearer ${{ env.STRAVA_ACCESS_TOKEN }}" \
            -o club_activities.json

      - name: Commit and Push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add club_activities.json
          git commit -m "Update Strava club activities" || exit 0
          git push