<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konkurrenten - infoskjerm</title>
    <style>
        :root {
            --bg-a: #0a0f1f;
            --bg-b: #121c36;
            --panel: rgba(9, 17, 37, 0.78);
            --panel-border: rgba(100, 140, 255, 0.45);
            --text: #edf3ff;
            --muted: #9fb4e6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 10%, rgba(126, 199, 255, 0.18), transparent 32%),
                radial-gradient(circle at 85% 8%, rgba(100, 140, 255, 0.22), transparent 30%),
                linear-gradient(135deg, var(--bg-a), var(--bg-b));
            padding: 16px;
        }

        .shell {
            width: min(1500px, 100%);
            margin: 0 auto;
            height: calc(100vh - 32px);
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 12px;
        }

        .header {
            border: 1px solid var(--panel-border);
            background: var(--panel);
            border-radius: 12px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
            flex: 1;
        }

        .header-right {
            width: min(360px, 42vw);
            min-width: 210px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .meta {
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-bar-wrapper {
            height: 4px;
            background: rgba(147, 170, 244, 0.28);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, #00f2ff, #7000ff);
            box-shadow: 0 0 12px rgba(0, 242, 255, 0.6);
        }

        .viewer {
            border: 1px solid var(--panel-border);
            background: var(--panel);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .slide-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #050913;
        }

        .error {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            font-size: 16px;
            color: #ffb9b9;
            background: rgba(35, 8, 8, 0.84);
        }

        @media (max-width: 700px) {
            body {
                padding: 10px;
            }

            .shell {
                height: calc(100vh - 20px);
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-right {
                width: 100%;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header class="header">
            <div class="header-left">
                <div class="title">Konkurrenten - infoskjerm</div>
                <div class="meta" id="meta">Loading slideshow configuration...</div>
            </div>
            <div class="header-right">
                <div class="progress-bar-wrapper"><div class="progress-bar" id="slideProgress"></div></div>
            </div>
        </header>

        <section class="viewer">
            <iframe id="slideFrame" class="slide-frame" title="Slideshow"></iframe>
            <div id="error" class="error"></div>
        </section>
    </main>

    <script>
        const CONFIG_URL = 'slideshow.json';
        const DEFAULT_SECONDS = 10;

        const metaElement = document.getElementById('meta');
        const progressElement = document.getElementById('slideProgress');
        const errorElement = document.getElementById('error');
        const frameElement = document.getElementById('slideFrame');

        let slides = [];
        let currentIndex = 0;
        let timerId = null;
        let tickerId = null;
        let slideStartMs = 0;
        let slideDurationMs = 0;

        function showError(message) {
            errorElement.textContent = message;
            errorElement.style.display = 'flex';
            metaElement.textContent = 'Slideshow failed to start';
            progressElement.style.width = '0%';
        }

        function hideError() {
            errorElement.style.display = 'none';
        }

        function normalizeSlides(config) {
            const rawSlides = Array.isArray(config?.slides) ? config.slides : [];
            return rawSlides
                .map((slide) => {
                    const url = typeof slide?.url === 'string' ? slide.url.trim() : '';
                    const description = typeof slide?.description === 'string' ? slide.description.trim() : '';
                    const timer = Number(slide?.timer);
                    const seconds = Number.isFinite(timer) && timer > 0 ? timer : DEFAULT_SECONDS;
                    return {
                        url,
                        description: description || 'No description',
                        seconds
                    };
                })
                .filter((slide) => slide.url.length > 0);
        }

        function updateMeta() {
            const slide = slides[currentIndex];
            metaElement.textContent = `Slide ${currentIndex + 1}/${slides.length} | ${slide.description}`;
        }

        function updateTimingDisplay() {
            if (!slideDurationMs) return;

            const elapsedMs = Math.max(0, Date.now() - slideStartMs);
            const progressPct = Math.min(100, (elapsedMs / slideDurationMs) * 100);
            progressElement.style.width = `${progressPct}%`;
        }

        function startTimingTicker() {
            if (tickerId) clearInterval(tickerId);
            updateTimingDisplay();
            tickerId = setInterval(updateTimingDisplay, 100);
        }

        function scheduleNextSlide() {
            clearTimeout(timerId);
            const seconds = slides[currentIndex].seconds;
            timerId = setTimeout(() => {
                if (slides.length === 1) {
                    // Keep the progress animation looping without reloading the single slide iframe.
                    slideStartMs = Date.now();
                    slideDurationMs = seconds * 1000;
                    progressElement.style.width = '0%';
                    startTimingTicker();
                    scheduleNextSlide();
                    return;
                }

                currentIndex = (currentIndex + 1) % slides.length;
                showCurrentSlide();
            }, seconds * 1000);
        }

        function showCurrentSlide() {
            hideError();
            const slide = slides[currentIndex];
            slideStartMs = Date.now();
            slideDurationMs = slide.seconds * 1000;
            progressElement.style.width = '0%';
            frameElement.src = slide.url;
            updateMeta();
            startTimingTicker();
            scheduleNextSlide();
        }

        async function startSlideshow() {
            try {
                const response = await fetch(CONFIG_URL, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Unable to load ${CONFIG_URL} (${response.status})`);
                }

                const config = await response.json();
                slides = normalizeSlides(config);

                if (!slides.length) {
                    throw new Error('No valid slides found in slideshow.json');
                }

                currentIndex = 0;
                showCurrentSlide();
            } catch (error) {
                console.error(error);
                showError(error.message || 'Unexpected slideshow error');
            }
        }

        window.addEventListener('beforeunload', () => {
            clearTimeout(timerId);
            if (tickerId) clearInterval(tickerId);
        });

        startSlideshow();
    </script>
</body>
</html>
