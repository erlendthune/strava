<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Sykle til jobben 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #fff;
            margin-bottom: 10px;
            text-align: center;
            font-size: 48px;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            font-size: 16px;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        /* Leaderboard Container */
        #leaderboard-container {
            position: relative;
            width: 100%;
            min-height: 600px;
            margin-bottom: 40px;
        }

        /* The "Secret Sauce" - Team Row Animation */
        .team-row {
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            position: absolute;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 30px;
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            backdrop-filter: blur(5px);
            z-index: 5;
        }

        .team-row.crown-glow {
            animation: glow 1.5s ease-in-out infinite alternate;
            border-left-color: #00f2ff;
            z-index: 10;
        }

        .team-row.fall-off {
            transform: translateX(150%) rotate(15deg) translateY(50%);
            opacity: 0;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 10px #00f2ff, 0 0 20px rgba(0, 242, 255, 0.5);
                border-left-color: #00f2ff;
                background: linear-gradient(90deg, rgba(0, 242, 255, 0.15) 0%, rgba(112, 0, 255, 0.1) 100%);
            }
            to {
                box-shadow: 0 0 30px #00f2ff, 0 0 50px #7000ff, 0 0 10px rgba(112, 0, 255, 0.5);
                border-left-color: #7000ff;
                background: linear-gradient(90deg, rgba(0, 242, 255, 0.2) 0%, rgba(112, 0, 255, 0.15) 100%);
            }
        }

        /* Rank Badge */
        .rank-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-size: 28px;
            font-weight: bold;
            flex-shrink: 0;
            min-width: 60px;
        }

        .team-row.crown-glow .rank-badge {
            background: linear-gradient(135deg, #00f2ff, #7000ff);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
        }

        /* Team Info */
        .team-info {
            flex: 1;
            min-width: 0;
        }

        .team-name {
            font-size: clamp(18px, 2.2vw, 24px);
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .team-row.crown-glow .team-name {
            color: #00f2ff;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.6);
        }

        .team-distance {
            font-size: 14px;
            color: #aaa;
        }

        .team-members {
            font-size: 12px;
            color: #b9c2ff;
            margin-top: 6px;
            line-height: 1.35;
            max-width: 95%;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .team-row.crown-glow .team-distance {
            color: #00d4ff;
        }

        .team-row.crown-glow .team-members {
            color: #8ff8ff;
        }

        /* Stats */
        .team-stats {
            display: flex;
            gap: clamp(10px, 2vw, 24px);
            flex-shrink: 1;
            flex-wrap: wrap;
            justify-content: flex-end;
            min-width: 0;
        }

        .stat {
            text-align: right;
            min-width: 72px;
        }

        .stat-value {
            font-size: clamp(15px, 1.8vw, 22px);
            font-weight: bold;
            color: #00f2ff;
            font-family: 'Courier New', monospace;
        }

        .team-row.crown-glow .stat-value {
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }

        .stat-label {
            font-size: clamp(10px, 1.1vw, 12px);
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 3px;
        }

        /* Crown Icon for Champion */
        .crown-icon {
            font-size: 32px;
            animation: float 3s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* Loading State */
        .loading {
            text-align: center;
            color: #aaa;
            padding: 60px 20px;
            font-size: 18px;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* Footer */
        .footer {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .last-update {
            color: #00f2ff;
            font-weight: 500;
        }

        /* Company Stats Grid */
        .company-stats-section {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid rgba(255, 255, 255, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-radius: 8px;
            padding: 16px 12px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.3);
            backdrop-filter: blur(5px);
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: bold;
            color: #00f2ff;
            margin-bottom: 6px;
        }

        .stat-card .label {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 32px;
            }

            .team-row {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px 20px;
                gap: 10px;
            }

            .rank-badge {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            .team-name {
                font-size: 20px;
            }

            .team-stats {
                width: 100%;
                gap: 15px;
                flex-wrap: wrap;
            }

            .stat {
                flex: 1;
                text-align: left;
            }

            #leaderboard-container {
                min-height: auto;
            }
        }

        @media (max-width: 980px) {
            .team-row {
                gap: 14px;
                padding: 16px 20px;
            }

            .team-distance {
                font-size: 13px;
            }

            .team-members {
                font-size: 11px;
            }

            .team-stats {
                max-width: 46%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Leaderboard - Sykle til jobben 2026</h1>
        <div class="subtitle" id="subtitle">Bouvet Norge As Agder - Live Rankings</div>

        <div id="leaderboard-container" class="loading">Loading leaderboard...</div>

        <div class="company-stats-section" id="statsSection"></div>

        <div class="footer">
            Last updated: <span class="last-update" id="lastUpdate">--:--</span>
            <br>
            Auto-refreshing every 30 seconds
        </div>
    </div>

    <script>
        const ROW_GAP = 14;
        let currentChampion = "";
        let leaderboardData = [];
        let teamRowElements = {};
        let teamMembersByTeamId = {};
        let teamMembersByTitle = {};
        let lastUpdateTimestamp = null;
        let nationalData = null;
        let countyData = null;
        let communityData = null;

        function formatKm(centimeters) {
            if (!centimeters) return "0.0";
            return (centimeters / 100000).toFixed(1);
        }

        function formatTime(totalSeconds) {
            if (!totalSeconds) return "0h 0m";
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            return `${hours}h ${minutes}m`;
        }

        function updateTeamMembersLookup(members) {
            teamMembersByTeamId = {};
            teamMembersByTitle = {};

            members.forEach((member) => {
                const fullName = `${member.firstname || ''} ${member.lastname || ''}`.trim();
                if (!fullName) return;

                const memberData = {
                    name: fullName,
                    points: Number(member.points) || 0
                };

                if (!teamMembersByTeamId[member.teamId]) {
                    teamMembersByTeamId[member.teamId] = [];
                }
                teamMembersByTeamId[member.teamId].push(memberData);

                if (!teamMembersByTitle[member.teamTitle]) {
                    teamMembersByTitle[member.teamTitle] = [];
                }
                teamMembersByTitle[member.teamTitle].push(memberData);
            });

            Object.keys(teamMembersByTeamId).forEach((teamId) => {
                teamMembersByTeamId[teamId].sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));
            });

            Object.keys(teamMembersByTitle).forEach((title) => {
                teamMembersByTitle[title].sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));
            });
        }

        function getTeamMembers(team) {
            return teamMembersByTeamId[team.teamId] || teamMembersByTitle[team.title] || [];
        }

        function formatTeamMembers(team) {
            const members = getTeamMembers(team);
            if (!members.length) return 'Medlemmer: Ingen registrert';
            const memberStrings = members.map((m) => `${m.name} (${m.points.toFixed(0)}p)`).join(', ');
            return `Medlemmer: ${memberStrings}`;
        }

        function layoutRows() {
            const container = document.getElementById('leaderboard-container');
            const rows = Array.from(container.getElementsByClassName('team-row'));
            let top = 0;

            rows.forEach((row) => {
                row.style.top = `${top}px`;
                top += row.offsetHeight + ROW_GAP;
            });

            container.style.minHeight = `${Math.max(top, 420)}px`;
        }

        function updateRankBadges() {
            const container = document.getElementById('leaderboard-container');
            const rows = Array.from(container.getElementsByClassName('team-row'));

            rows.forEach((row, index) => {
                const rankBadge = row.querySelector('.rank-badge');
                if (rankBadge) {
                    rankBadge.textContent = index + 1;
                }
                
                // First place always glows
                if (index === 0) {
                    row.classList.add('crown-glow');
                } else {
                    row.classList.remove('crown-glow');
                }
            });
        }

        function renderLeaderboard(data) {
            const container = document.getElementById('leaderboard-container');
            
            // Only show top 3
            const topThree = data.slice(0, 3);
            
            // Clear existing rows but keep them for animation reference
            if (leaderboardData.length === 0) {
                container.innerHTML = '';
            }

            leaderboardData = topThree;

            // If this is the first load, create all rows
            if (Object.keys(teamRowElements).length === 0) {
                topThree.forEach((team, index) => {
                    const row = createTeamRow(team, index + 1);
                    container.appendChild(row);
                    teamRowElements[team.title] = row;
                });
                container.classList.remove('loading');
                layoutRows();
                updateRankBadges();
            } else {
                // Update positions for existing rows
                topThree.forEach((team, index) => {
                    const row = teamRowElements[team.title];
                    if (row) {
                        updateTeamStats(row, team);
                    } else {
                        const newRow = createTeamRow(team, index + 1);
                        container.appendChild(newRow);
                        teamRowElements[team.title] = newRow;
                    }
                });
                layoutRows();
                updateRankBadges();
            }
        }

        function createTeamRow(team, rank) {
            const row = document.createElement('div');
            row.className = 'team-row';
            row.setAttribute('data-team', team.title);
            row.style.top = '0px';

            const isChampion = rank === 1;

            row.innerHTML = `
                ${isChampion ? '<span class="crown-icon">👑</span>' : ''}
                <div class="rank-badge">${rank}</div>
                <div class="team-info">
                    <div class="team-name">${team.title}</div>
                    <div class="team-distance">${formatKm(team.totalCentimeters)} km</div>
                    <div class="team-members">${formatTeamMembers(team)}</div>
                </div>
                <div class="team-stats">
                    <div class="stat">
                        <div class="stat-value">${(team.totalPoints || 0).toFixed(2)}</div>
                        <div class="stat-label">Points</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${team.totalWorkouts}</div>
                        <div class="stat-label">Workouts</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${formatTime(team.totalSeconds)}</div>
                        <div class="stat-label">Time</div>
                    </div>
                </div>
            `;

            return row;
        }

        function updateTeamStats(row, team) {
            const stats = row.querySelector('.team-stats');
            stats.innerHTML = `
                <div class="stat">
                    <div class="stat-value">${(team.totalPoints || 0).toFixed(2)}</div>
                    <div class="stat-label">Points</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${team.totalWorkouts}</div>
                    <div class="stat-label">Workouts</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${formatTime(team.totalSeconds)}</div>
                    <div class="stat-label">Time</div>
                </div>
            `;

            const distance = row.querySelector('.team-distance');
            distance.textContent = `${formatKm(team.totalCentimeters)} km`;

            const members = row.querySelector('.team-members');
            if (members) {
                members.textContent = formatTeamMembers(team);
            }
        }

        function updateLeaderboard(newFirstTeamName) {
            const container = document.getElementById('leaderboard-container');
            const rows = container.getElementsByClassName('team-row');

            let oldFirst = null;
            let newFirst = null;

            // 1. Find the current #1 and the team that is supposed to be #1
            for (let i = 0; i < rows.length; i++) {
                if (i === 0) oldFirst = rows[i];
                if (rows[i].getAttribute('data-team') === newFirstTeamName) {
                    newFirst = rows[i];
                }
            }

            // 2. Only animate if there is a change
            if (oldFirst && newFirst && oldFirst !== newFirst) {
                // Add the "fall off" class to the old leader
                oldFirst.classList.add('fall-off');

                // Wait a beat, then rearrange
                setTimeout(() => {
                    // Remove the old leader from DOM or move to bottom
                    container.appendChild(oldFirst);
                    oldFirst.classList.remove('fall-off');
                    oldFirst.classList.remove('crown-glow');
                    oldFirst.className = 'team-row';

                    // Remove crown icon from old first
                    const oldCrown = oldFirst.querySelector('.crown-icon');
                    if (oldCrown) oldCrown.remove();

                    // Move new leader to top of the DOM
                    container.insertBefore(newFirst, container.firstChild);

                    // Add crown to new first
                    if (!newFirst.querySelector('.crown-icon')) {
                        const crown = document.createElement('span');
                        crown.className = 'crown-icon';
                        crown.textContent = '👑';
                        newFirst.insertBefore(crown, newFirst.firstChild);
                    }

                    // Reposition all rows and update glow
                    layoutRows();
                    updateRankBadges();
                    // Glow is now permanently maintained by updateRankBadges()
                }, 800);
            }
        }

        function checkForCoup(teams) {
            if (teams.length === 0) return;

            // Get the top team
            const topTeam = teams[0].title;

            if (currentChampion !== "" && currentChampion !== topTeam) {
                // BOOM! Someone was overtaken
                console.log(`🏆 New Champion! ${topTeam} overtook ${currentChampion}`);
                updateLeaderboard(topTeam);
            }

            currentChampion = topTeam;
        }

        function renderCompanyStats() {
            const statsSection = document.getElementById('statsSection');
            if (!nationalData) {
                statsSection.innerHTML = '';
                return;
            }

            let html = '<div class="stats-grid">';
            
            if (nationalData.rank && nationalData.totalCompanies) {
                html += `<div class="stat-card"><div class="value">#${nationalData.rank} / ${nationalData.totalCompanies}</div><div class="label">Nasjonalt</div></div>`;
            }
            if (countyData && countyData.rank && countyData.totalCompanies) {
                html += `<div class="stat-card"><div class="value">#${countyData.rank} / ${countyData.totalCompanies}</div><div class="label">Fylke</div></div>`;
            }
            if (communityData && communityData.rank && communityData.totalCompanies) {
                html += `<div class="stat-card"><div class="value">#${communityData.rank} / ${communityData.totalCompanies}</div><div class="label">Kommune</div></div>`;
            }
            if (nationalData.countCompanyMembers) {
                html += `<div class="stat-card"><div class="value">${nationalData.countCompanyMembers}</div><div class="label">Medlemmer</div></div>`;
            }
            if (nationalData.pointsTotal !== undefined) {
                html += `<div class="stat-card"><div class="value">${nationalData.pointsTotal.toFixed(2)}</div><div class="label">Totalt Poeng</div></div>`;
            }
            if (nationalData.totalWorkouts) {
                html += `<div class="stat-card"><div class="value">${nationalData.totalWorkouts}</div><div class="label">Totalt Økter</div></div>`;
            }
            if (nationalData.totalCentimeters) {
                html += `<div class="stat-card"><div class="value">${(nationalData.totalCentimeters / 100000).toFixed(1)} km</div><div class="label">Totalt Km</div></div>`;
            }
            
            html += '</div>';
            statsSection.innerHTML = html;
        }

        function updateTimestamp() {
            const lastUpdate = document.getElementById('lastUpdate');
            if (lastUpdateTimestamp) {
                const date = new Date(lastUpdateTimestamp);
                lastUpdate.textContent = date.toLocaleString('no-NO');
            } else {
                lastUpdate.textContent = '--:--';
            }
        }

        async function loadLeaderboardData() {
            try {
                const [teamsResponse, membersResponse, updateResponse, natResponse, countyResponse, communityResponse] = await Promise.all([
                    fetch('sykletiljobben.json'),
                    fetch('sykletiljobbenmembers.json'),
                    fetch('last_update.json'),
                    fetch('sykletiljobben.json'),
                    fetch('sykletiljobben_county.json'),
                    fetch('sykletiljobben_community.json')
                ]);
                if (!teamsResponse.ok) throw new Error('Failed to load leaderboard data');

                const data = await teamsResponse.json();
                const teams = data.teamsDetailed || [];
                const teamMembers = membersResponse.ok ? await membersResponse.json() : [];
                const updateData = updateResponse.ok ? await updateResponse.json() : null;
                
                // Load company-level data
                if (natResponse.ok) {
                    const natData = await natResponse.json();
                    nationalData = natData;
                }
                if (countyResponse.ok) {
                    const countyDataFetched = await countyResponse.json();
                    countyData = countyDataFetched;
                }
                if (communityResponse.ok) {
                    const commDataFetched = await communityResponse.json();
                    communityData = commDataFetched;
                }
                
                if (updateData && updateData.timestamp) {
                    lastUpdateTimestamp = updateData.timestamp;
                }
                
                updateTeamMembersLookup(Array.isArray(teamMembers) ? teamMembers : []);
                
                // Sort by points first, then distance (descending)
                teams.sort((a, b) => {
                    const pointDiff = (b.totalPoints || 0) - (a.totalPoints || 0);
                    if (pointDiff !== 0) return pointDiff;
                    return (b.totalCentimeters || 0) - (a.totalCentimeters || 0);
                });

                checkForCoup(teams);
                renderLeaderboard(teams);
                renderCompanyStats();
                updateTimestamp();

            } catch (error) {
                console.error('Error loading leaderboard:', error);
                const container = document.getElementById('leaderboard-container');
                container.classList.remove('loading');
                container.innerHTML = `<div class="loading" style="color: #ff4444;">Error loading leaderboard. Retrying...</div>`;
            }
        }

        // Initial load
        loadLeaderboardData();

        // Auto-refresh every 30 seconds
        setInterval(loadLeaderboardData, 30000);

        // Update timestamp every second
        setInterval(updateTimestamp, 1000);
    </script>
</body>
</html>
