name: Sync Strava Data
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  repository_dispatch:
    types: [strava_webhook] # Allows you to trigger it via webhook
  workflow_dispatch: # Allows you to click a button to run it manually

concurrency:
  group: strava-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Fresh Access Token
        id: strava_auth
        run: |
          TOKEN_RESPONSE=$(curl -X POST https://www.strava.com/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          
          # Extract the access token using jq
          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          echo "STRAVA_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Fetch Club Members
        run: |
          node << 'EOF'
          const fs = require('fs');
          
          async function fetchAllMembers(token, clubId) {
            let allMembers = [];
            let page = 1;
            let hasMore = true;
            
            while (hasMore) {
              const url = `https://www.strava.com/api/v3/clubs/${clubId}/members?page=${page}&per_page=200`;
              
              const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
              });
              
              if (!response.ok) {
                throw new Error(`Failed to fetch members page ${page}: ${response.statusText}`);
              }
              
              const members = await response.json();
              
              if (members.length === 0) {
                hasMore = false;
              } else {
                allMembers = allMembers.concat(members);
                page++;
              }
            }
            
            return allMembers;
          }
          
          const token = process.env.STRAVA_ACCESS_TOKEN;
          const clubId = 1475451;
          
          fetchAllMembers(token, clubId)
            .then(members => {
              fs.writeFileSync('club_members.json', JSON.stringify(members, null, 2));
              console.log(`Fetched ${members.length} club members`);
            })
            .catch(err => {
              console.error('Error:', err.message);
              process.exit(1);
            });
          EOF

      - name: Fetch Club Activities
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');
          
          async function fetchAllActivities(token, clubId) {
            let allActivities = [];
            let page = 1;
            let hasMore = true;
            
            while (hasMore) {
              const url = `https://www.strava.com/api/v3/clubs/${clubId}/activities?page=${page}&per_page=50`;
              
              const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
              });
              
              if (!response.ok) {
                throw new Error(`Failed to fetch page ${page}: ${response.statusText}`);
              }
              
              const activities = await response.json();
              
              if (activities.length === 0) {
                hasMore = false;
              } else {
                allActivities = allActivities.concat(activities);
                page++;
              }
            }
            
            return allActivities;
          }
          
          const token = process.env.STRAVA_ACCESS_TOKEN;
          const clubId = 1475451;
          
          fetchAllActivities(token, clubId)
            .then(activities => {
              fs.writeFileSync('club_activities.json', JSON.stringify(activities, null, 2));
              console.log(`Fetched ${activities.length} activities`);
            })
            .catch(err => {
              console.error('Error:', err.message);
              process.exit(1);
            });
          EOF

      - name: Anonymize Names
        run: |
          node << 'EOF'
          const fs = require('fs');
          const crypto = require('crypto');
          
          const funnyNames = [
            "Rapid Rabbit", "Speedy Cheetah", "Turbo Tortoise", "Zippy Zebra",
            "Swift Swan", "Dashing Deer", "Blazing Bear", "Zooming Zebra",
            "Mighty Mongoose", "Speeding Snail", "Nitro Newt", "Velocity Vole",
            "Sonic Sparrow", "Specter Squirrel", "Rocket Rhino", "Cosmic Coyote",
            "Quantum Quail", "Phantom Porcupine", "Lightning Llama", "Thunder Tapir",
            "Comet Caterpillar", "Vortex Vixen", "Warp Weasel", "Flux Flamingo"
          ];
          
          function hashString(str) {
            return Math.abs(crypto.createHash('md5').update(str).digest('hex').charCodeAt(0) * 0x10001);
          }
          
          function getFunnyName(realName) {
            const hash = hashString(realName);
            return funnyNames[hash % funnyNames.length];
          }
          
          // Anonymize activities
          const data = JSON.parse(fs.readFileSync('club_activities.json', 'utf8'));
          const nameMap = {};
          
          const anonymized = data.map(activity => {
            const athlete = activity.athlete;
            const realName = `${athlete.firstname} ${athlete.lastname}`;
            
            if (!nameMap[realName]) {
              nameMap[realName] = getFunnyName(realName);
            }
            
            return {
              ...activity,
              name: activity.sport_type,
              start_date: activity.start_date,
              start_date_local: activity.start_date_local,
              athlete: {
                ...athlete,
                firstname: nameMap[realName].split(' ')[0],
                lastname: nameMap[realName].split(' ')[1]
              }
            };
          });
          
          fs.writeFileSync('club_activities.json', JSON.stringify(anonymized, null, 2));
          
          // Anonymize members
          const members = JSON.parse(fs.readFileSync('club_members.json', 'utf8'));
          const anonymizedMembers = members.map(member => {
            const realName = `${member.firstname} ${member.lastname}`;
            
            if (!nameMap[realName]) {
              nameMap[realName] = getFunnyName(realName);
            }
            
            return {
              ...member,
              firstname: nameMap[realName].split(' ')[0],
              lastname: nameMap[realName].split(' ')[1]
            };
          });
          
          fs.writeFileSync('club_members.json', JSON.stringify(anonymizedMembers, null, 2));
          EOF

      - name: Update Master History
        run: |
          node << 'EOF'
          const fs = require('fs');
          
          function fingerprint(a) {
            // Activities have no IDs, build a stable fingerprint
            return [
              a.athlete.firstname,
              a.athlete.lastname,
              a.sport_type,
              a.distance,
              a.moving_time,
              a.elapsed_time,
              a.total_elevation_gain
            ].join('|');
          }
          
          const current = JSON.parse(fs.readFileSync('club_activities.json', 'utf8'));
          
          let history = [];
          if (fs.existsSync('master_history.json')) {
            history = JSON.parse(fs.readFileSync('master_history.json', 'utf8'));
          }
          
          const seen = new Set(history.map(fingerprint));
          const nowIso = new Date().toISOString();
          let added = 0;
          
          for (const activity of current) {
            const fp = fingerprint(activity);
            if (!seen.has(fp)) {
              seen.add(fp);
              history.push({ ...activity, first_seen: nowIso });
              added++;
            }
          }
          
          // Keep only activities from the last 7 days (use start_date if available, otherwise first_seen)
          const cutoff = Date.now() - 7 * 24 * 60 * 60 * 1000;
          const before = history.length;
          history = history.filter(a => {
            const dateToCheck = a.start_date || a.first_seen;
            return new Date(dateToCheck).getTime() >= cutoff;
          });
          const removed = before - history.length;
          
          fs.writeFileSync('master_history.json', JSON.stringify(history, null, 2));
          console.log(`Added ${added} new activities, pruned ${removed} older than 7 days. Total: ${history.length}`);
          EOF

      - name: Commit and Push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add club_activities.json club_members.json master_history.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Strava club activities"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main