name: Sync Strava Data
on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  repository_dispatch:
    types: [strava_webhook] # Allows you to trigger it via webhook
  workflow_dispatch: # Allows you to click a button to run it manually

concurrency:
  group: strava-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize Config
        run: |
          node << 'EOF'
          const fs = require('fs');
          
          // If master_history.json doesn't exist, reset config.json with today's date
          if (!fs.existsSync('master_history.json')) {
            const today = new Date().toISOString();
            const config = {
              startDate: today
            };
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
            console.log(`Reset config.json with start date: ${today}`);
          } else if (!fs.existsSync('config.json')) {
            // If master_history exists but config doesn't, use current date as fallback
            const config = {
              startDate: new Date().toISOString()
            };
            fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
            console.log(`Created missing config.json with current date`);
          } else {
            console.log('Both files exist, no config change needed');
          }
          EOF

      - name: Get Fresh Access Token
        id: strava_auth
        run: |
          TOKEN_RESPONSE=$(curl -X POST https://www.strava.com/oauth/token \
            -d client_id=${{ secrets.STRAVA_CLIENT_ID }} \
            -d client_secret=${{ secrets.STRAVA_CLIENT_SECRET }} \
            -d refresh_token=${{ secrets.STRAVA_REFRESH_TOKEN }} \
            -d grant_type=refresh_token)
          
          # Extract the access token using jq
          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | jq -r '.access_token')
          echo "STRAVA_ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Fetch Club Members
        run: |
          node << 'EOF'
          const fs = require('fs');
          
          async function fetchAllMembers(token, clubId) {
            let allMembers = [];
            let page = 1;
            let hasMore = true;
            
            while (hasMore) {
              const url = `https://www.strava.com/api/v3/clubs/${clubId}/members?page=${page}&per_page=200`;
              
              const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
              });
              
              if (!response.ok) {
                throw new Error(`Failed to fetch members page ${page}: ${response.statusText}`);
              }
              
              const members = await response.json();
              
              if (members.length === 0) {
                hasMore = false;
              } else {
                allMembers = allMembers.concat(members);
                page++;
              }
            }
            
            return allMembers;
          }
          
          const token = process.env.STRAVA_ACCESS_TOKEN;
          const clubId = 1475451;
          
          fetchAllMembers(token, clubId)
            .then(members => {
              fs.writeFileSync('club_members.json', JSON.stringify(members, null, 2));
              console.log(`Fetched ${members.length} club members`);
            })
            .catch(err => {
              console.error('Error:', err.message);
              process.exit(1);
            });
          EOF

      - name: Fetch Club Activities
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');
          
          async function fetchAllActivities(token, clubId) {
            let allActivities = [];
            let page = 1;
            let hasMore = true;
            
            while (hasMore) {
              const url = `https://www.strava.com/api/v3/clubs/${clubId}/activities?page=${page}&per_page=50`;
              
              const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
              });
              
              if (!response.ok) {
                throw new Error(`Failed to fetch page ${page}: ${response.statusText}`);
              }
              
              const activities = await response.json();
              
              if (activities.length === 0) {
                hasMore = false;
              } else {
                allActivities = allActivities.concat(activities);
                page++;
              }
            }
            
            return allActivities;
          }
          
          const token = process.env.STRAVA_ACCESS_TOKEN;
          const clubId = 1475451;
          
          fetchAllActivities(token, clubId)
            .then(activities => {
              fs.writeFileSync('club_activities_raw.json', JSON.stringify(activities, null, 2));
              console.log(`Fetched ${activities.length} activities`);
            })
            .catch(err => {
              console.error('Error:', err.message);
              process.exit(1);
            });
          EOF

      - name: Mark Activity Dates
        run: |
          node << 'EOF'
          const fs = require('fs');
          
          function fingerprint(a) {
            // Create a stable fingerprint for each activity
            return [
              a.athlete.firstname,
              a.athlete.lastname,
              a.type,
              a.distance,
              a.moving_time,
              a.elapsed_time,
              a.total_elevation_gain
            ].join('|');
          }
          
          const currentActivities = JSON.parse(fs.readFileSync('club_activities_raw.json', 'utf8'));
          const now = new Date().toISOString();
          
          // Load previous activities if they exist
          let previousActivities = [];
          if (fs.existsSync('club_activities.json')) {
            previousActivities = JSON.parse(fs.readFileSync('club_activities.json', 'utf8'));
          }
          
          // Build a map of previous activities by fingerprint
          const previousMap = new Map();
          previousActivities.forEach(activity => {
            const fp = fingerprint(activity);
            previousMap.set(fp, activity.activity_date || null);
          });
          
          // Mark each current activity with a date
          const markedActivities = currentActivities.map(activity => {
            const fp = fingerprint(activity);
            const existingDate = previousMap.get(fp);
            
            return {
              ...activity,
              activity_date: existingDate !== undefined ? existingDate : now
            };
          });
          
          fs.writeFileSync('club_activities.json', JSON.stringify(markedActivities, null, 2));
          
          const newCount = markedActivities.filter(a => a.activity_date === now).length;
          console.log(`Marked ${newCount} new activities with date ${now}`);
          console.log(`${markedActivities.length - newCount} activities were already tracked`);
          EOF

      - name: Anonymize Names
        run: |
          node << 'EOF'
          const fs = require('fs');
          
          // Organize funny names by first letter for anonymization
          const firstNames = {
            'A': ['Agile', 'Alert', 'Acrobatic', 'Athletic'],
            'B': ['Blazing', 'Bold', 'Bouncy', 'Brilliant'],
            'C': ['Cosmic', 'Clever', 'Crazy', 'Courageous'],
            'D': ['Dashing', 'Dynamic', 'Daring', 'Determined'],
            'E': ['Energetic', 'Eager', 'Elite', 'Epic'],
            'F': ['Flux', 'Fast', 'Ferocious', 'Fearless'],
            'G': ['Golden', 'Glorious', 'Graceful', 'Gallant'],
            'H': ['Heroic', 'Hornet', 'Happy', 'Mighty'],
            'J': ['Jolly', 'Jumping', 'Jetpack', 'Jazz'],
            'K': ['King', 'Keen', 'Knight', 'Kinetic'],
            'L': ['Lightning', 'Loyal', 'Lively', 'Luminous'],
            'M': ['Mighty', 'Marvellous', 'Mystic', 'Monumental'],
            'N': ['Nitro', 'Nimble', 'Noble', 'Nautical'],
            'P': ['Phantom', 'Power', 'Phoenix', 'Pristine'],
            'Q': ['Quantum', 'Quick', 'Quirky', 'Quest'],
            'R': ['Rapid', 'Rocket', 'Royal', 'Radiant'],
            'S': ['Speedy', 'Sonic', 'Stellar', 'Supreme'],
            'T': ['Turbo', 'Thunder', 'Titanic', 'Tornado'],
            'V': ['Velocity', 'Vortex', 'Vibrant', 'Victory'],
            'W': ['Warp', 'Wild', 'Warrior', 'Wise'],
            'Z': ['Zippy', 'Zealous', 'Zenith', 'Zero']
          };
          
          const lastNames = {
            'A': ['Antelope', 'Albatross', 'Anaconda', 'Armadillo'],
            'B': ['Bear', 'Badger', 'Butterfly', 'Buffalo'],
            'C': ['Cheetah', 'Caterpillar', 'Coyote', 'Crocodile'],
            'D': ['Deer', 'Dolphin', 'Duck', 'Dingo'],
            'E': ['Eagle', 'Eel', 'Elephant', 'Elk'],
            'F': ['Falcon', 'Flamingo', 'Fox', 'Frog'],
            'G': ['Gazelle', 'Giraffe', 'Goose', 'Grasshopper'],
            'H': ['Horse', 'Hawk', 'Hamster', 'Hedgehog'],
            'J': ['Jaguar', 'Jellyfish', 'Jay', 'Jackal'],
            'K': ['Koala', 'Kingfisher', 'Kangaroo', 'Kestrel'],
            'L': ['Llama', 'Lion', 'Lynx', 'Lemur'],
            'M': ['Mongoose', 'Moose', 'Mantis', 'Macaw'],
            'N': ['Newt', 'Narwhal', 'Nightingale', 'Numbat'],
            'P': ['Porcupine', 'Penguin', 'Panther', 'Parrot'],
            'Q': ['Quail', 'Quelea', 'Quokka', 'Quintail'],
            'R': ['Rabbit', 'Rhino', 'Raven', 'Raccoon'],
            'S': ['Swan', 'Sparrow', 'Squirrel', 'Snail'],
            'T': ['Tortoise', 'Tapir', 'Tiger', 'Toucan'],
            'V': ['Vole', 'Viper', 'Vulture', 'Vicuña'],
            'W': ['Weasel', 'Wolf', 'Wasp', 'Walrus'],
            'Z': ['Zebra', 'Zorilla', 'Zander', 'Zonkey']
          };
          
          function buildNameMap(realNames) {
            const unique = [...new Set(realNames)].sort();
            const assigned = {};
            const usedCombos = new Set();
            
            for (const realName of unique) {
              const parts = realName.split(' ');
              if (parts.length < 2) continue;
              
              const firstLetter = parts[0].toUpperCase()[0];
              const lastLetter = parts[1].toUpperCase()[0];
              
              // Get available names for this person's initials
              const availableFirst = firstNames[firstLetter] || firstNames['A'];
              const availableLast = lastNames[lastLetter] || lastNames['A'];
              
              // Find an unused combination
              let selected = null;
              for (const fname of availableFirst) {
                for (const lname of availableLast) {
                  const combo = `${fname} ${lname}`;
                  if (!usedCombos.has(combo)) {
                    selected = combo;
                    usedCombos.add(combo);
                    break;
                  }
                }
                if (selected) break;
              }
              
              // Fallback if we somehow run out (shouldn't happen with 7 members)
              if (!selected) {
                selected = `${availableFirst[0]} ${availableLast[0]}`;
                usedCombos.add(selected);
              }
              
              assigned[realName] = selected;
            }
            
            return assigned;
          }
          
          const data = JSON.parse(fs.readFileSync('club_activities.json', 'utf8'));
          const members = JSON.parse(fs.readFileSync('club_members.json', 'utf8'));
          
          // Collect every real name from both datasets before building the map
          const allRealNames = [
            ...data.map(a => `${a.athlete.firstname} ${a.athlete.lastname}`),
            ...members.map(m => `${m.firstname} ${m.lastname}`)
          ];
          const nameMap = buildNameMap(allRealNames);
          
          // Anonymize activities
          const anonymized = data.map(activity => {
            const athlete = activity.athlete;
            const realName = `${athlete.firstname} ${athlete.lastname}`;
            const funnyName = nameMap[realName];
            return {
              ...activity,
              name: activity.sport_type,
              athlete: {
                ...athlete,
                firstname: funnyName.split(' ')[0],
                lastname: funnyName.split(' ')[1]
              }
            };
          });
          
          fs.writeFileSync('club_activities.json', JSON.stringify(anonymized, null, 2));
          
          // Anonymize members
          const anonymizedMembers = members.map(member => {
            const realName = `${member.firstname} ${member.lastname}`;
            const funnyName = nameMap[realName];
            return {
              ...member,
              firstname: funnyName.split(' ')[0],
              lastname: funnyName.split(' ')[1]
            };
          });
          
          fs.writeFileSync('club_members.json', JSON.stringify(anonymizedMembers, null, 2));
          EOF

      - name: Update Master History
        run: |
          node << 'EOF'
          const fs = require('fs');
          
          function fingerprint(a) {
            // Activities have no IDs, build a stable fingerprint
            return [
              a.athlete.firstname,
              a.athlete.lastname,
              a.sport_type,
              a.distance,
              a.moving_time,
              a.elapsed_time,
              a.total_elevation_gain
            ].join('|');
          }
          
          const current = JSON.parse(fs.readFileSync('club_activities.json', 'utf8'));
          
          let history = [];
          if (fs.existsSync('master_history.json')) {
            history = JSON.parse(fs.readFileSync('master_history.json', 'utf8'));
          }
          
          const seen = new Set(history.map(fingerprint));
          let added = 0;
          
          for (const activity of current) {
            const fp = fingerprint(activity);
            if (!seen.has(fp)) {
              seen.add(fp);
              // Preserve the activity_date from the marked activities
              history.push(activity);
              added++;
            }
          }
          
          fs.writeFileSync('master_history.json', JSON.stringify(history, null, 2));
          console.log(`Added ${added} new activities. Total: ${history.length}`);
          EOF

      - name: Commit and Push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add club_activities.json club_members.json master_history.json config.json
          git diff --cached --quiet && exit 0
          git commit -m "Update Strava club activities"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main