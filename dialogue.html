<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sykle til jobben: Siste 7 Dager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chivo:wght@400;700;900&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #11152b;
            --bg-2: #16213e;
            --panel-bg: rgba(19, 27, 58, 0.7);
            --panel-border: rgba(124, 150, 255, 0.35);
            --panel-title: #d8e2ff;
            --muted: #9fb0d7;
            --text-main: #eef4ff;
            --accent: #6fa1ff;
            --accent-2: #00f2ff;
            --glow: #7000ff;
            --hayes: #ff8f8f;
            --teacher: #9af7cb;
            --bubble-bg: rgba(11, 18, 40, 0.72);
            --line: rgba(143, 169, 255, 0.2);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans", sans-serif;
            color: var(--text-main);
            background: linear-gradient(130deg, var(--bg-1) 0%, var(--bg-2) 100%);
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: stretch;
        }

        .stage {
            width: min(1100px, 100%);
            background:
                radial-gradient(circle at 12% 18%, rgba(0, 242, 255, 0.14), transparent 36%),
                radial-gradient(circle at 88% 12%, rgba(112, 0, 255, 0.18), transparent 38%),
                rgba(15, 21, 47, 0.74);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 14px;
            backdrop-filter: blur(10px);
            box-shadow: 0 18px 52px rgba(0, 0, 0, 0.42);
            overflow: hidden;
        }

        .header {
            padding: 24px 28px;
            border-bottom: 2px solid rgba(111, 161, 255, 0.25);
            background: linear-gradient(100deg, rgba(24, 32, 69, 0.88), rgba(16, 22, 46, 0.82));
        }

        h1 {
            margin: 0;
            font-family: "Chivo", sans-serif;
            font-size: clamp(1.4rem, 3.2vw, 2.2rem);
            letter-spacing: 0.02em;
            color: #f4f7ff;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.4), 0 0 24px rgba(112, 0, 255, 0.35);
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            font-size: 0.98rem;
        }

        .week-meta {
            margin-top: 10px;
            font-weight: 600;
            color: #b7c6ea;
        }

        .dialogue-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            padding: 24px;
        }

        .card {
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            border-radius: 12px;
            box-shadow: 0 0 0 1px rgba(111, 161, 255, 0.12), 0 0 20px rgba(58, 93, 228, 0.15);
            backdrop-filter: blur(6px);
            padding: 16px;
            display: grid;
            grid-template-columns: 84px 1fr;
            gap: 14px;
            align-items: start;
            animation: rise 500ms ease both;
        }

        .card.teacher {
            animation-delay: 120ms;
        }

        .card:hover {
            box-shadow: 0 0 0 1px rgba(111, 161, 255, 0.18), 0 0 28px rgba(0, 242, 255, 0.16);
        }

        .avatar-wrap {
            width: 84px;
            height: 84px;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(122, 154, 255, 0.35);
            background: repeating-linear-gradient(
                45deg,
                rgba(8, 18, 45, 0.55),
                rgba(8, 18, 45, 0.55) 8px,
                rgba(18, 33, 75, 0.8) 8px,
                rgba(18, 33, 75, 0.8) 16px
            );
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.74rem;
            color: #8ff8ff;
            font-weight: 600;
            line-height: 1.2;
            padding: 8px;
            box-shadow: 0 0 14px rgba(0, 242, 255, 0.22);
        }

        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .speaker {
            margin: 0;
            font-family: "Chivo", sans-serif;
            font-size: 1rem;
            letter-spacing: 0.03em;
            color: var(--panel-title);
        }

        .speaker.hayes {
            color: var(--hayes);
            text-shadow: 0 0 10px rgba(255, 143, 143, 0.25);
        }

        .speaker.teacher {
            color: var(--teacher);
            text-shadow: 0 0 10px rgba(154, 247, 203, 0.22);
        }

        .bubble {
            margin-top: 8px;
            background: var(--bubble-bg);
            border: 1px solid rgba(122, 154, 255, 0.3);
            border-radius: 14px;
            padding: 14px;
            line-height: 1.6;
            color: var(--text-main);
            min-height: 180px;
            white-space: pre-wrap;
            box-shadow: inset 0 0 0 1px rgba(111, 161, 255, 0.08);
        }

        .stats {
            border-top: 1px solid rgba(111, 161, 255, 0.25);
            margin: 0 24px 24px;
            padding-top: 14px;
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.5;
            text-shadow: 0 0 8px rgba(111, 161, 255, 0.18);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 900px) {
            .dialogue-grid {
                grid-template-columns: 1fr;
            }

            .bubble {
                min-height: 0;
            }
        }

        @media (max-width: 560px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 18px;
            }

            .dialogue-grid {
                padding: 14px;
                gap: 12px;
            }

            .card {
                grid-template-columns: 68px 1fr;
                padding: 12px;
            }

            .avatar-wrap {
                width: 68px;
                height: 68px;
            }

            .stats {
                margin: 0 14px 14px;
            }
        }
    </style>
</head>
<body>
    <main class="stage">
        <section class="header">
            <h1>Sykle til jobben: Siste 7 Dager</h1>
            <p id="week-label" class="week-meta">Laster uke...</p>
        </section>

        <section class="dialogue-grid">
            <article class="card">
                <div class="avatar-wrap" id="hayes-avatar-wrap">
                    <img id="hayes-avatar" src="avatars/hayes.png" alt="Avatar for drill sergeant Hayes">
                </div>
                <div>
                    <h2 class="speaker hayes">DRILL SERGEANT HAYES</h2>
                    <div id="hayes-text" class="bubble">Laster Hayes-oppsummering...</div>
                </div>
            </article>

            <article class="card teacher">
                <div class="avatar-wrap" id="teacher-avatar-wrap">
                    <img id="teacher-avatar" src="avatars/teacher.png" alt="Avatar for positiv lærer">
                </div>
                <div>
                    <h2 class="speaker teacher">POSITIV PEDAGOG</h2>
                    <div id="teacher-text" class="bubble">Laster læreroppsummering...</div>
                </div>
            </article>
        </section>

        <section id="stats" class="stats"></section>
    </main>

    <script>
        const weekLabelEl = document.getElementById("week-label");
        const hayesTextEl = document.getElementById("hayes-text");
        const teacherTextEl = document.getElementById("teacher-text");
        const statsEl = document.getElementById("stats");

        function setFallbackAvatar(imgId, fallbackText) {
            const img = document.getElementById(imgId);
            const wrap = img.parentElement;
            img.addEventListener("error", () => {
                img.remove();
                wrap.textContent = fallbackText;
            });
        }

        setFallbackAvatar("hayes-avatar", "LEGG INN\nHAYES-BILDE");
        setFallbackAvatar("teacher-avatar", "LEGG INN\nLÆRER-BILDE");

        function formatTypeMix(activityTypeMix) {
            if (!Array.isArray(activityTypeMix) || !activityTypeMix.length) {
                return "Ingen data";
            }

            return activityTypeMix
                .map(entry => `${entry.type}: ${entry.count}`)
                .join(", ");
        }

        async function loadDialogue() {
            try {
                const response = await fetch("weekly_dialogue.json");
                if (!response.ok) {
                    throw new Error(`Kunne ikke lese weekly_dialogue.json (${response.status})`);
                }

                const dialogue = await response.json();
                const stats = dialogue.stats || {};

                weekLabelEl.textContent = `Ukegrunnlag: ${dialogue.week_label || "Ingen datert aktivitet"}`;
                hayesTextEl.textContent = dialogue.hayes || "Hayes-oppsummering mangler.";
                teacherTextEl.textContent = dialogue.teacher || "Læreroppsummering mangler.";
                statsEl.textContent = [
                    `Aktiviteter: ${stats.activities ?? 0}`,
                    `Deltakere: ${stats.participants ?? 0}`,
                    `Distanse: ${Number(stats.distance_km ?? 0).toFixed(1)} km`,
                    `Tid: ${Number(stats.moving_hours ?? 0).toFixed(1)} timer`,
                    `Aktivitetsmiks: ${formatTypeMix(stats.activity_type_mix)}`
                ].join(" | ");
            } catch (error) {
                weekLabelEl.textContent = "Kunne ikke laste dialoggrunnlag";
                hayesTextEl.textContent = "Data mangler. Kjør generate_weekly_dialogue.py for å lage weekly_dialogue.json.";
                teacherTextEl.textContent = "Når weekly_dialogue.json finnes, vises den genererte læreroppsummeringen her.";
                statsEl.textContent = error.message;
            }
        }

        loadDialogue();
    </script>
</body>
</html>
